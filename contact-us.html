<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SmartTools Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 font-sans p-6 md:p-20">
    <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-8 md:p-16 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-gray-700">
        <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 font-bold mb-10 hover:underline">
            ← Back to Home
        </a>
        <h1 class="text-4xl font-black mb-8">Get in Touch</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-12">Have questions about our tools or suggestions for new features? We'd love to hear from you.</p>

        <form class="space-y-6" action="#" method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-widest">Full Name</label>
                    <input type="text" required class="w-full p-4 bg-gray-50 dark:bg-gray-900 border rounded-2xl dark:border-gray-700 font-bold outline-none focus:ring-4 focus:ring-blue-500/10 transition-all" placeholder="John Doe">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-widest">Email Address</label>
                    <input type="email" required class="w-full p-4 bg-gray-50 dark:bg-gray-900 border rounded-2xl dark:border-gray-700 font-bold outline-none focus:ring-4 focus:ring-blue-500/10 transition-all" placeholder="john@example.com">
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-black text-gray-400 uppercase tracking-widest">Subject</label>
                <select class="w-full p-4 bg-gray-50 dark:bg-gray-900 border rounded-2xl dark:border-gray-700 font-bold outline-none focus:ring-4 focus:ring-blue-500/10 transition-all">
                    <option>General Inquiry</option>
                    <option>Bug Report</option>
                    <option>Feature Request</option>
                    <option>Advertising</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-black text-gray-400 uppercase tracking-widest">Message</label>
                <textarea required rows="6" class="w-full p-6 bg-gray-50 dark:bg-gray-900 border rounded-3xl dark:border-gray-700 font-medium outline-none focus:ring-4 focus:ring-blue-500/10 transition-all" placeholder="How can we help?"></textarea>
            </div>
            <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-3xl font-black shadow-xl shadow-blue-600/20 active:scale-[0.98] transition-all uppercase tracking-widest text-sm">Send Message</button>
        </form>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
