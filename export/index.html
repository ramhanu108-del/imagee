<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Knife - All Your Work Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-300">
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i data-lucide="wrench"></i></div>
                <span class="text-xl font-extrabold tracking-tight">Swiss <span class="text-blue-600">Knife</span></span>
            </div>
            <button id="themeToggle" class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                <i data-lucide="moon" id="moonIcon"></i>
                <i data-lucide="sun" id="sunIcon" class="hidden"></i>
            </button>
        </div>
    </nav>

    <main id="main">
        <header class="pt-20 pb-12 px-4 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">Productivity <span class="text-blue-600">Suite</span></h1>
            <div class="relative max-w-2xl mx-auto mb-10">
                <input type="text" id="toolSearch" placeholder="Search 33+ tools..." class="w-full pl-14 pr-6 py-5 rounded-2xl bg-white dark:bg-gray-900 border-2 border-gray-100 dark:border-gray-800 focus:border-blue-500 outline-none shadow-xl">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"><i data-lucide="search"></i></div>
            </div>
            <div id="categoryTabs" class="flex flex-wrap justify-center gap-2"></div>
        </header>
        <section class="max-w-7xl mx-auto px-4 pb-32">
            <div id="toolGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <div id="toolModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col" id="modalContainer">
            <div class="px-8 py-6 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
                <h2 id="modalTitle" class="text-2xl font-bold">Tool</h2>
                <button onclick="closeTool()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl"><i data-lucide="x"></i></button>
            </div>
            <div id="modalBody" class="flex-1 overflow-y-auto p-8"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
